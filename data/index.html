<html>
    <head>
        <meta charset="utf-8">
        <title>ACDGV</title>
        <link rel="stylesheet" href="http://192.168.0.103/struktura.css">
    </head>

    <script>
        let websocket;

        function connectWebSocket() {
            websocket = new WebSocket(`ws://192.168.0.103:81/`, ['arduino']);

            websocket.onopen = function(event) {
                console.log('połączono', event);
                document.getElementById('status').innerHTML = 'połączono';
            };

            websocket.onmessage = function(event) {
                let commands = [];
                if (event.data) {
                    commands = JSON.parse(event.data);
                }
                if (commands.length > 0) {
                    for (let i=0; i<commands.length; i++) {
                        const command = commands[i];

                        if (command.a[0][5] === 1) {
                            console.log("websocket sesstion millis: " + command.v[0]);
                        }

                        if (command.a[0][5] === 2) {
                            const nfcTag = document.getElementById('nfcTag');
                            nfcTag.innerHTML = command.v[0];
                        }

                        if (command.a[0][5] === 3) {
                            const gamepad = document.getElementById('gamepad');
                            gamepad.style.left = 125 + command.v[0] * 100 + 'px';
                            gamepad.style.top = 125 - command.v[1] * 100 + 'px';
                        }

                        if (command.a[0][5] === 4) {
                            const accelerometer = document.getElementById('accelerometer');
                            accelerometer.style.left = 125 - command.v[0] * 100 + 'px';
                            accelerometer.style.top = 125 - command.v[1] * 100 + 'px';
                        }
                    }
                }
            };

            websocket.onerror = function(event) {
                console.error('wystąpił błąd', event);
            };

            websocket.onclose = function(event) {
                console.log('rozłączono', event);
            };
        }

        function czytajTagNfc() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                const command = {
                    a: [[11,1,4,2,2,1]]
                };
                websocket.send(JSON.stringify([command]));
            } else {
                console.error('WebSocket nie jest połączony');
            }
        }

        function zapiszNaNfc() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                const inputValue = document.getElementById('nfcInput').value;
                console.log(inputValue);
                const command = {
                    a: [[11,1,4,2,2,2]],
                    v: [inputValue]
                };
                websocket.send(JSON.stringify([command]));
            } else {
                console.error('WebSocket nie jest połączony');
            }
        }
    </script>

    <body>
        
        <div class="row">
            <button onclick="connectWebSocket()">Połącz</button>
            <span id="status"></span><br/>
        </div>

        <div class="row">
            <div class="device">
                <button onclick="czytajTagNfc()">odczyt z NFC</button>

                <button onclick="zapiszNaNfc()">zapis na NFC</button>
                <textarea id="nfcInput" placeholder="Wpisz dane do zapisu"></textarea>
            </div>

            <div class="device">
                <div id="gamepad" class="ball"></div>
            </div>

            <div class="device" class="ball">
                <div id="accelerometer" class="ball"></div>
            </div>
        </div>

        <div class="row">
            <span id="nfcTag"></span>
        </div>
    </body>
</html>
