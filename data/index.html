<html>
    <script>
        let websocket;

        function connectWebSocket() {
            websocket = new WebSocket(`ws://192.168.18.138:81/`, ['arduino']);

            websocket.onopen = function(event) {
                console.log('połączono', event);
                document.getElementById('status').innerHTML = 'połączono';
            };

            websocket.onmessage = function(event) {
                let commands = [];
                if (event.data) {
                    commands = JSON.parse(event.data);
                }
                if (commands.length > 0) {
                    for (let i=0; i<commands.length; i++) {
                        const command = commands[i];
                        if (command.a[0][5] === 3) {
                            const gamepad = document.getElementById('gamepad');
                            gamepad.style.left = 125 + command.v[0] * 100 + 'px';
                            gamepad.style.top = 125 - command.v[1] * 100 + 'px';
                        }
                        if (command.a[0][5] === 4) {
                            const accelerometer = document.getElementById('accelerometer');
                            accelerometer.style.left = 125 - command.v[0] * 100 + 'px';
                            accelerometer.style.top = 125 - command.v[1] * 100 + 'px';
                        }
                    }
                }
            };

            websocket.onerror = function(event) {
                console.error('wystąpił błąd', event);
            };

            websocket.onclose = function(event) {
                console.log('rozłączono', event);
            };
        }
    </script>

    <body>
        <button onclick="connectWebSocket()">Połącz WebSocket</button>
        <span id="status"></span>

        <div style="background-color: yellow; width: 300px; height: 300px; position: relative">
            <div id="gamepad" style="background-color: black; width: 50px; height: 50px; position: relative; border-radius: 25px; left: 125px; top: 125px;"></div>
        </div>

        <div style="background-color: lightblue; width: 300px; height: 300px; position: relative">
            <div id="accelerometer" style="background-color: black; width: 50px; height: 50px; position: relative; border-radius: 25px; left: 125px; top: 125px;"></div>
        </div>
    </body>
</html>
